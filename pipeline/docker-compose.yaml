
services:
  pgdatabase:
    image: postgres:18
    environment:
      POSTGRES_USER: "root"
      POSTGRES_PASSWORD: "root"
      POSTGRES_DB: "ny_taxi"
    volumes:
      - "ny_taxi_postgres_data:/var/lib/postgresql/data"
    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: "admin@admin.com"
      PGADMIN_DEFAULT_PASSWORD: "root"
    volumes:
      - "pgadmin_data:/var/lib/pgadmin"
    ports:
      - "8085:80"

  ingest:
    image: taxi_ingest:v001
    depends_on:
      - pgdatabase
    command: >
      --pg_user=root
      --pg_pass=root
      --pg_host=pgdatabase
      --pg_port=5432
      --pg_db=ny_taxi
      --target_table=yellow_taxi_trips

volumes:
  ny_taxi_postgres_data:
  pgadmin_data:
